# Super Agent - Kubernetes Secret Template
# Copy this file to secret.yaml and fill in the actual values
# DO NOT commit secret.yaml to git!
#
# Note: Values should be plain text (NOT base64 encoded) - Kubernetes will encode them
# when using stringData instead of data

apiVersion: v1
kind: Secret
metadata:
  name: super-agent-secrets
  namespace: super-agent
type: Opaque
stringData:
  # =============================================================================
  # SAP AI Core credentials for Python backend (JP region)
  # Used for: Main LLM, title generation, audio transcription
  # =============================================================================
  AICORE_BASE_URL: "https://api.ai.prod.ap-northeast-1.aws.ml.hana.ondemand.com/v2"
  AICORE_AUTH_URL: "https://your-subdomain.authentication.jp10.hana.ondemand.com/oauth/token"
  AICORE_CLIENT_ID: "sb-your-client-id!b1234|aicore!b44"
  AICORE_CLIENT_SECRET: "your-client-secret"
  AICORE_RESOURCE_GROUP: "your-resource-group"

  # =============================================================================
  # SAP AI Core credentials for Python backend (US region)
  # Used for: Audio transcription fallback (Gemini models)
  # =============================================================================
  AICORE_BASE_URL_US: "https://api.ai.prod.us-east-1.aws.ml.hana.ondemand.com/v2"
  AICORE_AUTH_URL_US: "https://your-subdomain.authentication.us10.hana.ondemand.com/oauth/token"
  AICORE_CLIENT_ID_US: "sb-your-client-id!b1234|aicore!b164"
  AICORE_CLIENT_SECRET_US: "your-client-secret"
  AICORE_RESOURCE_GROUP_US: "generative-ai"

  # =============================================================================
  # SAP AI Core Service Key (JSON) for MCP server
  # Used for: Embeddings, web search (Perplexity), document processing
  # Get from SAP BTP Cockpit -> AI Core Service Instance -> Service Keys
  # Format: Single-line JSON string
  # =============================================================================
  AICORE_SERVICE_KEY: '{"clientid":"...","clientsecret":"...","url":"...","serviceurls":{"AI_API_URL":"..."}}'

  # =============================================================================
  # SAP HANA Cloud credentials
  # Used for: Document vector store, RAG retrieval
  # =============================================================================
  HANA_DB_ADDRESS: "your-hana-instance.hana.prod-jp10.hanacloud.ondemand.com"
  HANA_DB_PORT: "443"
  HANA_DB_USER: "YOUR_DB_USER"
  HANA_DB_PASSWORD: "your-db-password"
