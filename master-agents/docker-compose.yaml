# Docker Compose for local development
# Note: For production, use Kyma deployment (k8s/deployment.yaml)
# Run with: docker-compose up --build

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
      - backend-mcp
    networks:
      - super-agent-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - CORS_ORIGINS=http://localhost:5173,http://localhost:5000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MOCK_MODE=${MOCK_MODE:-true}
      - AGENTIC_MODE=${AGENTIC_MODE:-false}
      - AICORE_BASE_URL=${AICORE_BASE_URL}
      - AICORE_AUTH_URL=${AICORE_AUTH_URL}
      - AICORE_CLIENT_ID=${AICORE_CLIENT_ID}
      - AICORE_CLIENT_SECRET=${AICORE_CLIENT_SECRET}
      - AICORE_RESOURCE_GROUP=${AICORE_RESOURCE_GROUP:-default}
      - MCP_SERVER_URL=http://backend-mcp:3001
      - LLM_MODEL=${LLM_MODEL:-gpt-4.1}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-1000}
    volumes:
      - backend-data:/app/data
    networks:
      - super-agent-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend-mcp:
    build:
      context: ./backend-mcp
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - AICORE_SERVICE_KEY=${AICORE_SERVICE_KEY}
      - SAP_AI_RESOURCE_GROUP=${SAP_AI_RESOURCE_GROUP:-default}
      - HANA_DB_ADDRESS=${HANA_DB_ADDRESS}
      - HANA_DB_PORT=${HANA_DB_PORT:-443}
      - HANA_DB_USER=${HANA_DB_USER}
      - HANA_DB_PASSWORD=${HANA_DB_PASSWORD}
      - HANA_VECTOR_TABLE=${HANA_VECTOR_TABLE:-LANGCHAIN_DEMO_DOCS}
      - HANA_HEADER_TABLE=${HANA_HEADER_TABLE:-LANGCHAIN_DEMO_DOCS_HEADER}
      - CHUNK_SIZE=${CHUNK_SIZE:-2000}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-200}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - S4HANA_USER=${S4HANA_USER}
      - S4HANA_PASSWORD=${S4HANA_PASSWORD}
      - S4PRODUCT_ENDPOINT=${S4PRODUCT_ENDPOINT}
      - S4MATERIAL_STOCK_ENDPOINT=${S4MATERIAL_STOCK_ENDPOINT}
    volumes:
      - mcp-data:/app/data
    networks:
      - super-agent-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  super-agent-network:
    driver: bridge

volumes:
  backend-data:
  mcp-data:
